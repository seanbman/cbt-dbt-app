name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install JavaScript dependencies
        run: npm install
      - name: Build Tailwind CSS
        run: npm run build:css
      - name: Check browser JavaScript
        run: npm test
      - name: Generate templ files
        run: go tool templ generate
      - name: Tidy Go modules
        run: go mod tidy
      - name: Format Go files
        run: gofmt -w .
      - name: Check whitespace
        run: git diff --check
      - name: Test Go packages
        run: go test ./...
      - name: Build server
        run: go build -o ./bin/server ./cmd/server
      - name: Smoke-test routes and static assets
        run: |
          ./bin/server > /tmp/steady-steps.log 2>&1 &
          SERVER_PID=$!
          trap 'kill $SERVER_PID' EXIT
          for attempt in {1..20}; do
            curl --fail --silent http://127.0.0.1:8080/ >/dev/null && break
            sleep 1
          done
          curl --fail --silent http://127.0.0.1:8080/help | grep '9-8-8'
          curl --fail --silent http://127.0.0.1:8080/exercises/example-slug | grep 'example-slug'
          curl --fail --silent http://127.0.0.1:8080/static/css/app.css >/dev/null
          curl --fail --silent http://127.0.0.1:8080/manifest.webmanifest >/dev/null
          curl --fail --silent http://127.0.0.1:8080/service-worker.js >/dev/null
