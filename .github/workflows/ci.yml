name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install JavaScript dependencies
        run: npm install
      - name: Test catalog and routing
        run: npm test
      - name: Build React Native Web app
        run: npm run build
      - name: Smoke-test static SPA output
        run: |
          npx serve -s dist -l 4173 > /tmp/steady-steps-static.log 2>&1 &
          SERVER_PID=$!
          trap 'kill $SERVER_PID' EXIT
          for attempt in {1..20}; do
            curl --fail --silent http://127.0.0.1:4173/ >/dev/null && break
            sleep 1
          done
          curl --fail --silent http://127.0.0.1:4173/ | grep 'Steady Steps'
          curl --fail --silent http://127.0.0.1:4173/exercises | grep 'Steady Steps'
          curl --fail --silent http://127.0.0.1:4173/exercises/thought-check | grep 'Steady Steps'
          curl --fail --silent http://127.0.0.1:4173/exercises/not-a-real-exercise | grep 'Steady Steps'
          curl --fail --silent http://127.0.0.1:4173/help | grep 'Steady Steps'
          curl --fail --silent http://127.0.0.1:4173/manifest.webmanifest | grep 'Steady Steps'
          curl --fail --silent http://127.0.0.1:4173/service-worker.js | grep 'CACHE_NAME'
